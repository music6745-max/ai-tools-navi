name: Codex AI Tools Navi AdSense Sync

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/codex-ai-tools-navi-adsense-sync.yml"
      - "codex-patches/ai-tools-navi-adsense-review.patch"

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event.head_commit.message == 'chore: queue ai tools adsense review sync' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
      - name: Apply Codex patch and remove temporary files
        run: |
          set -euo pipefail
          git apply --whitespace=nowarn codex-patches/ai-tools-navi-adsense-review.patch
          rm -f codex-patches/ai-tools-navi-adsense-review.patch .github/workflows/codex-ai-tools-navi-adsense-sync.yml
          rmdir codex-patches 2>/dev/null || true
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: tighten ai tools adsense review surface"
            git push origin HEAD:master
          fi
