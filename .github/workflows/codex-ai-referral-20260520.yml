name: Codex AI Referral Patch 20260520
on:
  push:
    branches: [master]
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - name: Apply patch
        shell: bash
        run: |
          cat > /tmp/patch.b64 <<'PATCH'

PATCH
          base64 -d /tmp/patch.b64 > /tmp/patch.diff
          git apply --index /tmp/patch.diff
      - name: Verify
        shell: bash
        run: |
          npm ci
          npx tsc --noEmit --pretty false
          npm run build
      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/codex-ai-referral-20260520.yml
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "feat: add investment referral links"
          git push origin master
